<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1322" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientTransform="translate(250 120) rotate(45) scale(520)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" stop-opacity="0.55" />
      <stop offset="1" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(1050 560) rotate(45) scale(460)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" stop-opacity="0.5" />
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="brand" x1="80" y1="0" x2="640" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- logo mark -->
  <rect x="80" y="84" width="72" height="72" rx="18" fill="url(#mark)" />
  <circle cx="116" cy="120" r="9" fill="#ffffff" />
  <text x="172" y="138" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#f3f6fb">Shivansh</text>

  <!-- availability pill -->
  <rect x="80" y="218" width="250" height="44" rx="22" fill="#6366f1" fill-opacity="0.14" stroke="#6366f1" stroke-opacity="0.4" />
  <circle cx="108" cy="240" r="6" fill="#22c55e" />
  <text x="126" y="247" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#9ca3af">Available for SDE-1 roles</text>

  <!-- name + role -->
  <text x="78" y="360" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="800" fill="#f9fafb" letter-spacing="-2">Shivansh Tiwari</text>
  <text x="80" y="438" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="url(#brand)">Java Full Stack Developer</text>

  <!-- tagline -->
  <text x="80" y="500" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="500" fill="#98a3bb">Spring Boot · REST APIs · Redis · Kafka · React</text>

  <!-- footer line -->
  <text x="80" y="566" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#6b7790">github.com/Shivansh23-code  ·  Jabalpur, India</text>
</svg>
